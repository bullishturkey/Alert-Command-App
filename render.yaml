services:
  - type: web
    name: alerts-command-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: ndx_command
      - key: WEBHOOK_SECRET
        sync: false
      - key: MIDAS_ENCRYPTION_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_ALERTS_CHANNEL_ID
        sync: false
      - key: EMERGENT_LLM_KEY
        sync: false
